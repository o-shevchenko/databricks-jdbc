# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: SQL Logic Test Runner

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:

    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Set up JDK 21
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Get JFrog OIDC token
      run: |
        set -euo pipefail

        # Get GitHub OIDC ID token
        ID_TOKEN=$(curl -sLS \
          -H "User-Agent: actions/oidc-client" \
          -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=jfrog-github" | jq .value | tr -d '"')
        echo "::add-mask::${ID_TOKEN}"

        # Exchange for JFrog access token
        ACCESS_TOKEN=$(curl -sLS -XPOST -H "Content-Type: application/json" \
          "https://databricks.jfrog.io/access/api/v1/oidc/token" \
          -d "{\"grant_type\": \"urn:ietf:params:oauth:grant-type:token-exchange\", \"subject_token_type\":\"urn:ietf:params:oauth:token-type:id_token\", \"subject_token\": \"${ID_TOKEN}\", \"provider_name\": \"github-actions\"}" | jq .access_token | tr -d '"')
        echo "::add-mask::${ACCESS_TOKEN}"

        if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
          echo "FAIL: Could not extract JFrog access token"
          exit 1
        fi

        echo "JFROG_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"

        echo "JFrog OIDC token obtained successfully"

    - name: Configure maven
      run: |
        set -euo pipefail

        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << EOF
        <settings>
          <mirrors>
            <mirror>
              <id>jfrog-central</id>
              <mirrorOf>*</mirrorOf>
              <url>https://databricks.jfrog.io/artifactory/db-maven/</url>
            </mirror>
          </mirrors>
          <servers>
            <server>
              <id>jfrog-central</id>
              <username>gha-service-account</username>
              <password>${JFROG_ACCESS_TOKEN}</password>
            </server>
          </servers>
        </settings>
        EOF

        echo "Maven configured to use JFrog registry"
    - name: Build with Maven
      run: mvn -pl jdbc-core -B package --file pom.xml -Dgroups='!Jvm17PlusAndArrowToNioReflectionDisabled'
    - name: Run SQL Logic Tests
      env:
        SLT_TOKEN: ${{ secrets.SLT_PAT_TOKEN }}
      run: mvn -pl jdbc-core exec:exec -Dslt.token="$SLT_TOKEN"
