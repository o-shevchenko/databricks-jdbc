name: Update Version and Create PR

on:
  workflow_dispatch:
    inputs:
      old_version:
        description: 'Old version to replace'
        required: true
      new_version:
        description: 'New version to update to'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version inputs
        env:
          OLD_VERSION: ${{ github.event.inputs.old_version }}
          NEW_VERSION: ${{ github.event.inputs.new_version }}
        run: |
          # Validate versions match expected patterns (semver or semver-SNAPSHOT)
          # to prevent shell/regex injection via crafted version strings.
          VERSION_PATTERN='^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'
          if ! echo "$OLD_VERSION" | grep -qE "$VERSION_PATTERN"; then
            echo "ERROR: old_version '$OLD_VERSION' does not match expected version pattern"
            exit 1
          fi
          if ! echo "$NEW_VERSION" | grep -qE "$VERSION_PATTERN"; then
            echo "ERROR: new_version '$NEW_VERSION' does not match expected version pattern"
            exit 1
          fi
          echo "Version inputs validated: $OLD_VERSION -> $NEW_VERSION"

      - name: Set up Git configuration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create new branch for version update
        id: create_branch
        env:
          NEW_VERSION: ${{ github.event.inputs.new_version }}
        run: |
          BRANCH_NAME="version-update-${NEW_VERSION}"
          git checkout -b "$BRANCH_NAME"
          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Replace old version with new version in repository
        env:
          OLD_VERSION: ${{ github.event.inputs.old_version }}
          NEW_VERSION: ${{ github.event.inputs.new_version }}
        run: |
          # Recursively search for files containing the old version and replace them.
          # Adjust file patterns or directories as needed.
          grep -rl "$OLD_VERSION" . | xargs sed -i "s/$OLD_VERSION/$NEW_VERSION/g" || echo "No occurrences found."

      - name: Commit changes
        env:
          OLD_VERSION: ${{ github.event.inputs.old_version }}
          NEW_VERSION: ${{ github.event.inputs.new_version }}
        run: |
          # Stage all changes
          git add .
          # Commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Update version from ${OLD_VERSION} to ${NEW_VERSION}"
          else
            echo "No changes to commit."
          fi

      - name: Push branch
        run: |
          git push origin "${{ steps.create_branch.outputs.branch }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.create_branch.outputs.branch }}
          title: "Update version from ${{ github.event.inputs.old_version }} to ${{ github.event.inputs.new_version }}"
          body: |
            This PR updates all references from version `${{ github.event.inputs.old_version }}` to `${{ github.event.inputs.new_version }}`.
          labels: version-update
