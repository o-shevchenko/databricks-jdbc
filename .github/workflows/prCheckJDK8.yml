name: JDK 8 Build and Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [jdk-8]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to checkout'
        required: false
        default: 'jdk-8'
      repository:
        description: 'Repository to checkout (e.g., user/repo)'
        required: false
        default: 'databricks/databricks-jdbc'
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual health check for JDK-8'

permissions:
  contents: read

jobs:
  jdk8-test:
    name: JDK 8 Unit Tests
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: 'adopt'

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || inputs.branch }}
          repository: ${{ github.event.pull_request.head.repo.full_name || inputs.repository }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-jdk8-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-jdk8-m2

      - name: Compile
        run: mvn clean install -DskipTests -Dspotless.skip=true

      - name: Run Unit Tests
        run: mvn -pl jdbc-core test -Dspotless.skip=true
