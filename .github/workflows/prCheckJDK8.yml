name: JDK 8 Build and Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [jdk-8]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to checkout'
        required: false
        default: 'jdk-8'
      repository:
        description: 'Repository to checkout (e.g., user/repo)'
        required: false
        default: 'databricks/databricks-jdbc'
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual health check for JDK-8'

permissions:
  id-token: write
  contents: read

jobs:
  jdk8-test:
    name: JDK 8 Unit Tests
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Set up JDK 8
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: 8
          distribution: 'adopt'

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.ref || inputs.branch }}
          repository: ${{ github.event.pull_request.head.repo.full_name || inputs.repository }}

      - name: Check if fork
        id: fork-check
        shell: bash
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "is_fork=true" >> $GITHUB_OUTPUT
            echo "This is a forked PR — will use cached dependencies"
          else
            echo "is_fork=false" >> $GITHUB_OUTPUT
            echo "This is a same-repo PR or dispatch — will use JFrog OIDC"
          fi

      - name: Setup Maven
        uses: ./.github/actions/setup-maven
        with:
          is-fork: ${{ steps.fork-check.outputs.is_fork }}

      - name: Compile
        run: mvn clean install -DskipTests -Dspotless.skip=true

      - name: Run Unit Tests
        run: mvn -pl jdbc-core test -Dspotless.skip=true
