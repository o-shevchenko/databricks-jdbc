name: 'Setup Maven with JFrog or Cache'
description: |
  Configures Maven for builds. For same-repo PRs and main branch pushes,
  authenticates to JFrog Artifactory via OIDC token exchange. For forked PRs,
  restores the Maven dependency cache from the default branch (no credentials).

inputs:
  is-fork:
    description: 'Whether this is a forked PR (true/false). Caller should compute this.'
    required: true

runs:
  using: 'composite'
  steps:
    # --- Forked PR path: restore cache only, no JFrog credentials ---
    - name: Restore Maven cache (fork)
      if: inputs.is-fork == 'true'
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.m2/repository
        key: maven-deps-${{ hashFiles('**/pom.xml') }}
        restore-keys: maven-deps-

    - name: Configure Maven for cache-only resolution (fork)
      if: inputs.is-fork == 'true'
      shell: bash
      run: |
        mkdir -p ~/.m2

        # Enable Maven offline mode via .mvn/maven.config. Offline mode prevents
        # all network requests — no JFrog auth needed, no Maven Central fallback.
        # The cache warmer normalizes _remote.repositories to use 'central' as the
        # repo ID, so offline mode accepts all cached artifacts.
        mkdir -p .mvn
        echo "-o" >> .mvn/maven.config
        echo "Maven offline mode enabled via .mvn/maven.config"

        # Empty settings — no mirrors needed in offline mode.
        cat > ~/.m2/settings.xml << 'SETTINGS_EOF'
        <settings />
        SETTINGS_EOF

        echo "Maven configured for forked PR (offline mode, cache-only)"

    # --- Same-repo path: full JFrog OIDC authentication ---
    - name: Get JFrog OIDC token
      if: inputs.is-fork == 'false'
      shell: bash
      run: |
        set -euo pipefail

        # Get GitHub OIDC ID token
        ID_TOKEN=$(curl -sLS \
          -H "User-Agent: actions/oidc-client" \
          -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=jfrog-github" | jq .value | tr -d '"')
        echo "::add-mask::${ID_TOKEN}"

        # Exchange for JFrog access token
        ACCESS_TOKEN=$(curl -sLS -XPOST -H "Content-Type: application/json" \
          "https://databricks.jfrog.io/access/api/v1/oidc/token" \
          -d "{\"grant_type\": \"urn:ietf:params:oauth:grant-type:token-exchange\", \"subject_token_type\":\"urn:ietf:params:oauth:token-type:id_token\", \"subject_token\": \"${ID_TOKEN}\", \"provider_name\": \"github-actions\"}" | jq .access_token | tr -d '"')
        echo "::add-mask::${ACCESS_TOKEN}"

        if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
          echo "FAIL: Could not extract JFrog access token"
          exit 1
        fi

        echo "JFROG_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"

        echo "JFrog OIDC token obtained successfully"

    - name: Configure Maven with JFrog credentials
      if: inputs.is-fork == 'false'
      shell: bash
      run: |
        set -euo pipefail

        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << EOF
        <settings>
          <mirrors>
            <mirror>
              <id>jfrog-central</id>
              <mirrorOf>*</mirrorOf>
              <url>https://databricks.jfrog.io/artifactory/db-maven/</url>
            </mirror>
          </mirrors>
          <servers>
            <server>
              <id>jfrog-central</id>
              <username>gha-service-account</username>
              <password>${JFROG_ACCESS_TOKEN}</password>
            </server>
          </servers>
        </settings>
        EOF

        echo "Maven configured to use JFrog registry"

    # Restore-only for non-fork path. Only the warmMavenCache workflow should
    # save the cache (it strips _remote.repositories before saving). If PR
    # workflows also save, they create dirty cache entries with repo ID markers
    # that break offline mode for forked PRs.
    - name: Restore Maven cache
      if: inputs.is-fork == 'false'
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.m2
        key: maven-deps-${{ hashFiles('**/pom.xml') }}
        restore-keys: maven-deps-
